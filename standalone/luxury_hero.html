<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Wedding Invitation - Shailendra & Nikita</title>
    <!-- Premium Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --maroon: #4a0404;
            --burgundy: #2d0101;
            --gold: #d4af37;
            --gold-glow: #f1e5ac;
            --text-light: #f5f0e6;
            --soft-pink: #f8bbd0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, var(--maroon) 0%, var(--burgundy) 100%);
            color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Luxurious Hero Section */
        .hero-section {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        /* Subtle Mandala Background */
        .mandala-bg {
            position: absolute;
            width: 150%;
            height: 150%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.05"><circle cx="50" cy="50" r="45" fill="none" stroke="%23d4af37" stroke-width="0.5" stroke-dasharray="2,2"/><circle cx="50" cy="50" r="35" fill="none" stroke="%23d4af37" stroke-width="0.3"/><circle cx="50" cy="50" r="25" fill="none" stroke="%23d4af37" stroke-width="0.2"/></svg>');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            animation: rotateMandala 200s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes rotateMandala {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Floating Rose Petals */
        .petals-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .petal {
            position: absolute;
            background-color: var(--soft-pink);
            border-radius: 150% 0 150% 0;
            opacity: 0.6;
            animation: fall linear infinite;
        }

        .petal.gold {
            background-color: var(--gold-glow);
            border-radius: 50%;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.4; }
            100% { transform: translateY(110vh) translateX(100px) rotate(360deg); opacity: 0; }
        }

        /* Content Wrapper */
        .content {
            position: relative;
            z-index: 10;
            max-width: 900px;
            padding: 20px;
        }

        /* Om Symbol */
        .om-symbol {
            font-size: 5rem;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
            margin-bottom: 20px;
            animation: omPulse 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes omPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 40px rgba(212, 175, 55, 1); }
        }

        /* Typography */
        .family-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            letter-spacing: 5px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .welcome-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.1rem;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .celebration-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
            opacity: 0.7;
        }

        .names {
            margin-bottom: 40px;
        }

        .cursive-name {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            color: var(--gold-glow);
            display: block;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            line-height: 1.2;
        }

        @media (max-width: 600px) {
            .cursive-name { font-size: 3.5rem; }
            .om-symbol { font-size: 3.5rem; }
        }

        .ampersand {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--gold);
            margin: 10px 0;
            display: block;
        }

        /* Diyas */
        .diya {
            position: absolute;
            bottom: 40px;
            width: 60px;
            height: 40px;
            z-index: 15;
            opacity: 0.9;
        }

        .diya.left { left: 40px; }
        .diya.right { right: 40px; }

        @media (max-width: 600px) {
            .diya { width: 40px; height: 30px; bottom: 80px; }
        }

        .diya-flame {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 25px;
            background: radial-gradient(ellipse at bottom, #ffeb3b, #ff9800, #f44336);
            border-radius: 50% 50% 20% 20% / 80% 80% 20% 20%;
            animation: flicker 0.1s infinite;
            box-shadow: 0 0 20px #ff9800;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) rotate(-1deg) scale(1); opacity: 0.9; }
            50% { transform: translateX(-50%) rotate(1deg) scale(1.1); opacity: 1; }
            100% { transform: translateX(-50%) rotate(-1deg) scale(1); opacity: 0.9; }
        }

        .diya-base {
            width: 100%;
            height: 100%;
            background: #5d4037;
            border-radius: 0 0 100px 100px;
            border-top: 5px solid #3e2723;
        }

        /* Mute Button */
        .audio-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 100;
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid var(--gold);
            color: var(--gold);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .audio-toggle:hover {
            background: rgba(212, 175, 55, 0.4);
            transform: scale(1.1);
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .scroll-text {
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        .bounce-arrow {
            animation: bounce 2s infinite;
            font-size: 1.5rem;
            color: var(--gold);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        /* Faint Couple Silhouette */
        .silhouette {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60%;
            background-image: url('https://w7.pngwing.com/pngs/424/307/png-transparent-bride-and-groom-illustration-marriage-wedding-bridegroom-silhouette-wedding-love-shuttlecocks-monochrome-wedding-anniversary.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            opacity: 0.05;
            filter: blur(5px);
            pointer-events: none;
            z-index: 2;
        }
    </style>
</head>
<body onclick="playMusic()">

    <!-- Audio Element -->
    <audio id="weddingMusic" loop>
        <source src="https://weddinginvites.org/wp-content/uploads/2021/04/Shehnai-Classical-Wedding-Music.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div class="audio-toggle" onclick="toggleAudio(event)" id="audioToggle">
        <span id="audioIcon">🔈</span>
    </div>

    <div class="hero-section">
        <div class="mandala-bg"></div>
        <div class="petals-container" id="petals"></div>
        <div class="silhouette"></div>

        <div class="content">
            <div class="om-symbol">ॐ</div>
            
            <div class="family-name">THE NIRANJAN FAMILY</div>
            <div class="welcome-text">warmly welcomes you</div>
            <div class="celebration-text">to the wedding celebration of</div>

            <div class="names">
                <span class="cursive-name">Shailendra</span>
                <span class="ampersand">&</span>
                <span class="cursive-name">Nikita</span>
            </div>
        </div>

        <div class="diya left">
            <div class="diya-flame"></div>
            <div class="diya-base"></div>
        </div>

        <div class="diya right">
            <div class="diya-flame"></div>
            <div class="diya-base"></div>
        </div>

        <div class="scroll-indicator">
            <span class="scroll-text">Scroll to Begin</span>
            <div class="bounce-arrow">↓</div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('weddingMusic');
        const icon = document.getElementById('audioIcon');
        let isMuted = true;
        let musicStarted = false;

        function toggleAudio(e) {
            if(e) e.stopPropagation();
            if (isMuted) {
                audio.play();
                icon.innerText = '🔊';
                isMuted = false;
            } else {
                audio.pause();
                icon.innerText = '🔈';
                isMuted = true;
            }
            musicStarted = true;
        }

        function playMusic() {
            if (!musicStarted) {
                audio.play();
                audio.volume = 0.3; // Very soft volume
                icon.innerText = '🔊';
                isMuted = false;
                musicStarted = true;
            }
        }

        // Create Falling Petals
        function createPetals() {
            const container = document.getElementById('petals');
            const petalCount = 30;

            for (let i = 0; i < petalCount; i++) {
                const petal = document.createElement('div');
                const isGold = Math.random() > 0.8;
                petal.className = isGold ? 'petal gold' : 'petal';
                
                const size = Math.random() * 10 + 5 + 'px';
                petal.style.width = size;
                petal.style.height = isGold ? size : (parseInt(size) * 1.5) + 'px';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = Math.random() * 5 + 8 + 's';
                petal.style.animationDelay = Math.random() * 10 + 's';
                
                container.appendChild(petal);
            }
        }
        createPetals();
    </script>
</body>
</html>
